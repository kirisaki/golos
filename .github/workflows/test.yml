name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: cd contracts && forge --version

      - name: Run Forge fmt
        run: cd contracts && forge fmt --check

      - name: Run Forge build
        run: cd contracts && forge build --sizes

      - name: Run Forge tests
        run: cd contracts && forge test -vvv

  relayer:
    name: Relayer
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: relayer/package-lock.json

      - name: Install dependencies
        run: cd relayer && npm ci

      - name: Type check
        run: cd relayer && npx tsc --noEmit

  deploy-relayer:
    name: Deploy Relayer
    needs: [check, relayer]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: relayer/package-lock.json

      - name: Install dependencies
        run: cd relayer && npm ci

      - name: Deploy to Cloudflare Workers
        run: cd relayer && npx wrangler deploy --minify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
